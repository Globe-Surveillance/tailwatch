name: tailwatch
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
concurrency:
  group: tailwatch

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install requests
      - run: python watch.py
        env:
          TS_API_TOKEN: ${{ secrets.TS_API_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
      - run: |
          git config user.name tailwatch
          git config user.email tailwatch@users.noreply.github.com
          git add state.json
          git diff --staged --quiet || (git commit -m "state" && git push)
      # - run: curl -fsS --retry 3 https://hc-ping.com/YOUR-UUID
